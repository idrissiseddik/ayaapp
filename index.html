<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI', Arial, 'Traditional Arabic';
    padding-top:95px;
    padding-bottom:75px;
    direction: rtl;
}
:root{
    --main:#198754;
    --dark:#146c43;
    --border-green:#2ecc71;
    --border-dark:#27ae60;
}
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:linear-gradient(135deg,var(--main),var(--dark));
    color:white;
    padding:12px 10px;
    z-index:1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header-title{
    font-size:18px;
    font-weight:bold;
    text-align: center;
    flex-grow:1;
}
.header-sub{
    font-size:12px;
    opacity:0.9;
}
.header-left, .header-right{
    width: 45px;
}
.admin-header-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
}
.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:linear-gradient(135deg,var(--main),var(--dark));
    color:white;
    text-align:center;
    padding:10px;
    font-size:12px;
    z-index:1000;
}
.card-box{
    margin:12px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

/* ========== CARTE COMMENTAIRE AVEC BORDURE VERTE ========== */
.comment-card {
    background: white;
    border-radius: 16px;
    margin-bottom: 25px;
    overflow: hidden;
    transition: all 0.3s ease;
    /* Bordure verte visible */
    border: 3px solid var(--border-green);
    box-shadow: 0 4px 12px rgba(46, 204, 113, 0.15);
}
.comment-card:hover {
    border-color: var(--border-dark);
    box-shadow: 0 6px 18px rgba(46, 204, 113, 0.25);
    transform: translateY(-2px);
}

/* ========== EN-TÊTE DU COMMENTAIRE ========== */
.comment-main {
    padding: 18px;
    background: linear-gradient(135deg, #ffffff 0%, #fefefe 100%);
}
.comment-main:hover {
    background: #fefefe;
}
.comment-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    border-bottom: 2px solid #e8f5e9;
    padding-bottom: 10px;
}
.comment-name {
    font-weight: bold;
    color: var(--main);
    font-size: 16px;
}
.comment-name i {
    margin-left: 8px;
    color: var(--main);
}
.comment-date {
    font-size: 11px;
    color: #adb5bd;
    background: #f8f9fa;
    padding: 3px 10px;
    border-radius: 20px;
}
.comment-text {
    margin: 15px 0;
    line-height: 1.8;
    color: #212529;
    text-align: right;
    font-size: 16px;
    padding: 8px 0;
}
.comment-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #e8f5e9;
}

/* ========== BOUTONS ========== */
.reply-btn {
    background: none;
    border: 2px solid var(--main);
    color: var(--main);
    font-size: 12px;
    cursor: pointer;
    padding: 6px 16px;
    border-radius: 25px;
    transition: all 0.2s;
    margin-right: 8px;
    font-weight: bold;
}
.reply-btn:hover {
    background: var(--main);
    color: white;
    transform: scale(1.02);
}
.btn-like {
    background: none;
    border: 2px solid #dc3545;
    color: #dc3545;
    padding: 6px 16px;
    border-radius: 25px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}
.btn-like:hover {
    background: #dc3545;
    color: white;
    transform: scale(1.02);
}
.btn-delete {
    background: none;
    border: 2px solid #dc3545;
    color: #dc3545;
    padding: 6px 16px;
    border-radius: 25px;
    font-size: 12px;
    margin-right: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}
.btn-delete:hover {
    background: #dc3545;
    color: white;
    transform: scale(1.02);
}

/* ========== SECTION DES RÉPONSES ========== */
.replies-section {
    background: #f0fdf4;
    border-top: 3px solid var(--border-green);
    padding: 15px 18px;
}
.replies-header {
    margin-bottom: 15px;
    padding-bottom: 8px;
    border-bottom: 2px dashed #c8e6d9;
}
.toggle-replies-btn {
    background: linear-gradient(135deg, #e8f5e9, #c8e6d9);
    border: 1px solid var(--border-green);
    color: var(--dark);
    font-size: 13px;
    cursor: pointer;
    padding: 6px 16px;
    border-radius: 25px;
    transition: all 0.2s;
    font-weight: bold;
}
.toggle-replies-btn:hover {
    background: linear-gradient(135deg, var(--main), var(--dark));
    color: white;
    border-color: var(--main);
}
.replies-container {
    margin-top: 12px;
}

/* ========== SOUS-COMMENTAIRE (RÉPONSE) ========== */
.sub-comment {
    margin-right: 45px;
    margin-top: 15px;
    margin-bottom: 15px;
    padding: 15px;
    background: white;
    border-radius: 12px;
    border-right: 5px solid var(--border-green);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: all 0.2s ease;
}
.sub-comment:last-child {
    margin-bottom: 0;
}
.sub-comment:hover {
    background: #ffffff;
    box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
    transform: translateX(-3px);
    border-right-width: 6px;
}
.sub-comment .comment-header {
    border-bottom: 1px solid #e8f5e9;
    padding-bottom: 6px;
    margin-bottom: 8px;
}
.sub-comment .comment-text {
    font-size: 14px;
    margin: 10px 0;
    line-height: 1.7;
}
.reply-badge {
    display: inline-block;
    background: linear-gradient(135deg, #e8f5e9, #c8e6d9);
    color: var(--dark);
    font-size: 10px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-right: 10px;
    font-weight: bold;
    border: 1px solid var(--border-green);
}
.reply-to {
    font-size: 11px;
    color: #6c757d;
    margin-left: 8px;
    background: #f8f9fa;
    padding: 2px 8px;
    border-radius: 15px;
}
.reply-to i {
    color: var(--main);
    font-size: 11px;
    margin-left: 5px;
}
.no-replies {
    text-align: center;
    color: #adb5bd;
    font-size: 13px;
    padding: 20px;
    font-style: italic;
    background: #f8f9fa;
    border-radius: 10px;
}

/* ========== BADGE DE COMPTEUR ========== */
.reply-count-badge {
    background: var(--main);
    color: white;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    margin-right: 8px;
}

/* ========== AUTRES STYLES ========== */

.soura-info {

.loading-spinner {

.today-badge {

    border-radius: 20px;
    font-size: 11px;
    margin-right: 8px;

.refresh-btn {

.comment-count {

    color: #666;

.admin-badge {

    color: #000;
    padding: 2px 8px;

    font-size: 10px;
    margin-left: 10px;

.toast-notification {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 999;
    animation: fadeOut 3s forwards;
}
@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}
.reply-modal {

.modal-title-welcome {

.modal-divider {

    font-weight: 600;

const API_URL = "https://script.google.com/macros/s/AKfycbyV11qMDxMJYeLfzjTD1qsbZuP2_9-7mzIzqvFG5wCr1UFc8qzVDMVASP3WihKfAiz7rQ/exec";

// ==================== FONCTIONS MODALES ====================
function showWelcomeModal() {
    document.getElementById('welcomeModal').style.display = 'flex';
}
function closeWelcomeModal() {
    document.getElementById('welcomeModal').style.display = 'none';
}
function openReplyModal(parentId, parentName) {
    currentReplyParent = parentId;
    currentReplyParentName = parentName;
    document.getElementById('replyingToText').innerHTML = `الرد على: <strong>${escapeHtml(parentName)}</strong>`;

// ==================== FONCTIONS UTILITAIRES ====================
function getTodayKey() {
    const today = new Date();
    return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
}

function getDailyNumber(max, seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
        hash = ((hash << 5) - hash) + seed.charCodeAt(i);
        hash = hash & hash;
    }
    return (Math.abs(Math.sin(hash) * 10000) % max) + 1;
}

function convertToDateKey(dateValue) {
    if (!dateValue) return null;
    try {
        let date = new Date(dateValue);
        if (isNaN(date.getTime())) return null;
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    } catch(e) { 
        return null; 
    }
}

function showNotification(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.style.background = isError ? 'rgba(220,53,69,0.9)' : 'rgba(25,135,84,0.9)';
    toast.innerHTML = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('todayBadge').innerHTML = getTodayKey();

// ==================== NOMS DES SOURATES ====================
const sourateNamesAr = {

// ==================== CHARGEMENT DE L'AYAH ====================
async function loadAyah() {
    try {
        const todayKey = getTodayKey();
        const sourateNumber = getDailyNumber(114, todayKey);
        const versetNumber = getDailyNumber(10, todayKey + "verse");
        const res = await fetch(`https://api.alquran.cloud/v1/ayah/${sourateNumber}:${versetNumber}`);
        const data = await res.json();
        let ayah;
        if (data.data) {
            ayah = {
                sourateNameFr: data.data.surah.englishName,
                sourateNameAr: sourateNamesAr[data.data.surah.englishName] || data.data.surah.name,
                ayahNumber: data.data.numberInSurah,
                ayahText: data.data.text
            };
        } else {
            const fallbackRes = await fetch("https://api.alquran.cloud/v1/ayah/random");
            const fallbackData = await fallbackRes.json();
            ayah = {
                sourateNameFr: fallbackData.data.surah.englishName,
                sourateNameAr: sourateNamesAr[fallbackData.data.surah.englishName] || fallbackData.data.surah.name,
                ayahNumber: fallbackData.data.numberInSurah,
                ayahText: fallbackData.data.text
            };
        }
        displayAyah(ayah);
    } catch(error) {
        document.getElementById("ayahBox").innerHTML = `<div class="text-center text-danger">خطأ في تحميل الآية</div>`;
    }
}

function displayAyah(ayah) {
    document.getElementById("ayahBox").innerHTML = `
        <div class="soura-info">
            <div class="soura-name-ar">${ayah.sourateNameAr}</div>
            <div class="soura-name-fr">${ayah.sourateNameFr} - ${ayah.ayahNumber}</div>
        </div>
        <div class="aya-text">${ayah.ayahText}</div>
        <div class="sadaq-allah">﴿ صدق الله العظيم ﴾</div>
        <div class="date-info">📅 ${new Date().toLocaleDateString('ar-EG')}</div>
    `;
}

// ==================== AJOUTER COMMENTAIRE PRINCIPAL ====================
async function addComment() {
    const nameInput = document.getElementById("name");
    const textInput = document.getElementById("text");
    const btn = document.getElementById("sendBtn");

    if (!textInput.value.trim()) {
        Swal.fire("خطأ", "اكتب تعليقاً", "error");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

    const params = new URLSearchParams();
    params.append('action', 'add');
    params.append('name', nameInput.value.trim() || "مجهول");
    params.append('text', textInput.value.trim());
    params.append('dayKey', getTodayKey());
    params.append('type', 'comment');
    
    try {
        await fetch(`${API_URL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' });
        
        nameInput.value = "";
        textInput.value = "";
        Swal.fire({ icon: 'success', title: 'تم الإضافة!', timer: 1500, showConfirmButton: false });
        setTimeout(() => loadComments(true), 1000);
    } catch(error) {
        nameInput.value = "";
        textInput.value = "";
        Swal.fire({ icon: 'success', title: 'تم الإرسال!', timer: 1500, showConfirmButton: false });
        setTimeout(() => loadComments(true), 1000);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-paper-plane"></i> إرسال التعليق';
    }
}

// ==================== SOUMETTRE UNE RÉPONSE ====================
async function submitReply() {
    const nameInput = document.getElementById('replyName');
    const textInput = document.getElementById('replyText');
    const name = nameInput.value.trim() || 'مجهول';
    const text = textInput.value.trim();
    
    if (!text) {
        Swal.fire('خطأ', 'الرجاء كتابة الرد', 'error');
        return;
    }
    
    const parentId = currentReplyParent;
    
    if (!parentId) {
        Swal.fire('خطأ', 'معرف التعليق الأصلي مفقود', 'error');
        return;
    }
    
    document.getElementById('replyModal').style.display = 'none';
    
    Swal.fire({ 
        title: 'جاري الإرسال...', 
        allowOutsideClick: false, 
        didOpen: () => { Swal.showLoading(); }
    });
    
    const params = new URLSearchParams();
    params.append('action', 'add');
    params.append('name', name);
    params.append('text', text);
    params.append('dayKey', getTodayKey());
    params.append('parentId', parentId);
    params.append('type', 'reply');
    
    try {
        await fetch(`${API_URL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' });
        Swal.close();
        Swal.fire({ icon: 'success', title: 'تم إرسال الرد!', timer: 1500, showConfirmButton: false });
        
        currentReplyParent = null;
        currentReplyParentName = "";
        
        setTimeout(() => loadComments(true), 1000);
    } catch(error) {
        console.error("Erreur:", error);
        Swal.close();
        Swal.fire({ icon: 'success', title: 'تم الإرسال!', timer: 1500, showConfirmButton: false });
        currentReplyParent = null;
        currentReplyParentName = "";
        setTimeout(() => loadComments(true), 1000);
    }
}

// ==================== LIKES ====================
async function likeComment(commentId, buttonElement) {
    const likeSpan = buttonElement.querySelector('.like-count');
    const currentLikes = likeSpan ? parseInt(likeSpan.textContent) : 0;
    
    buttonElement.disabled = true;
    buttonElement.style.opacity = '0.6';
    
    if (likeSpan) {
        likeSpan.textContent = currentLikes + 1;
    }
    
    const params = new URLSearchParams();
    params.append('action', 'like');
    params.append('id', commentId);
    
    try {
        const response = await fetch(`${API_URL}?${params.toString()}`);
        const result = await response.json();
        if (result.success && likeSpan) {
            likeSpan.textContent = result.likes;
            showNotification("❤️ تمت الإضافة!");
        } else if (likeSpan) {
            likeSpan.textContent = currentLikes;
        }
    } catch(error) {
        if (likeSpan) {
            likeSpan.textContent = currentLikes;
        }
        showNotification("❌ خطأ", true);
    } finally {
        buttonElement.disabled = false;
        buttonElement.style.opacity = '1';
    }
}

// ==================== SUPPRESSION ====================
async function deleteComment(commentId, buttonElement) {
    if (!isAdmin) {
        showNotification("❌ وضع المشرف غير مفعل", true);
        return;
    }
    
    const confirm = await Swal.fire({
        title: 'حذف التعليق',
        text: 'هل أنت متأكد؟',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'نعم',
        cancelButtonText: 'إلغاء'
    });
    
    if (!confirm.isConfirmed) return;
    
    const params = new URLSearchParams();
    params.append('action', 'delete');
    params.append('id', commentId);
    
    try {
        await fetch(`${API_URL}?${params.toString()}`);
        showNotification("✅ تم الحذف!");
        loadComments(true);
    } catch(error) {
        showNotification("❌ خطأ", true);
    }
}

// ==================== CHARGER LES COMMENTAIRES ====================
async function loadComments(showRefreshMessage = false) {
    try {
        const todayKey = getTodayKey();
        const response = await fetch(API_URL);
        const allData = await response.json();
        
        if (allData.error) throw new Error(allData.error);
        
        const allComments = allData.filter(c => convertToDateKey(c.dayKey) === todayKey);
        const parentComments = allComments.filter(c => !c.parentId || c.parentId === "" || c.parentId === null || c.parentId === 0);
        const replies = allComments.filter(c => c.parentId && c.parentId !== "" && c.parentId !== null && c.parentId !== 0);
        
        const repliesByParent = {};
        replies.forEach(reply => {
            const parentId = String(reply.parentId);
            if (!repliesByParent[parentId]) repliesByParent[parentId] = [];
            repliesByParent[parentId].push(reply);
        });
        
        document.getElementById('commentCount').innerHTML = `(${parentComments.length})`;
        
        if (parentComments.length === 0) {
            document.getElementById("comments").innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="fas fa-comment-dots fa-2x mb-2"></i>
                    <p>لا توجد تعليقات لهذا اليوم</p>
                    <small>كن أول من يعلق!</small>
                </div>
            `;
            if (showRefreshMessage) showNotification("📭 لا توجد تعليقات");
            return;
        }
        
        let html = "";
        parentComments.forEach(comment => {
            const commentId = String(comment.id);
            const commentReplies = repliesByParent[commentId] || [];
            const replyCount = commentReplies.length;
            
            html += `
                <div class="comment-card" data-id="${comment.id}">
                    <div class="comment-main">
                        <div class="comment-header">
                            <span class="comment-name">
                                <i class="fas fa-user-circle"></i> ${escapeHtml(comment.name)}
                            </span>
                            <span class="comment-date">${comment.date || ""}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-actions">
                            <button class="btn-like" onclick="likeComment(${comment.id}, this)">
                                ❤️ <span class="like-count">${comment.likes || 0}</span>
                            </button>
                            <button class="reply-btn" onclick="openReplyModal(${comment.id}, '${escapeHtml(comment.name)}')">
                                <i class="fas fa-reply"></i> رد
                            </button>
                            ${isAdmin ? `<button class="btn-delete" onclick="deleteComment(${comment.id}, this)">🗑 حذف</button>` : ''}
                        </div>
                    </div>
                    <div class="replies-section">
                        <div class="replies-header">
                            <button class="toggle-replies-btn" onclick="toggleReplies(${comment.id})" id="toggle-btn-${comment.id}">
                                <i class="fas fa-comments"></i> الردود (${replyCount})
                                <i class="fas fa-chevron-down" id="toggle-icon-${comment.id}"></i>
                            </button>
                        </div>
                        <div id="replies-${comment.id}" class="replies-container" style="display: block;">
                            ${renderReplies(commentReplies)}
                        </div>
                    </div>
                </div>
            `;
        });
        
        document.getElementById("comments").innerHTML = html;
        if (showRefreshMessage) showNotification(`✅ ${parentComments.length} تعليق(ات)`);
        
    } catch(error) {
        console.error("Erreur chargement:", error);
        document.getElementById("comments").innerHTML = `
            <div class="text-center text-danger py-4">
                <i class="fas fa-wifi fa-2x mb-2"></i>
                <p>⚠️ خطأ في الاتصال</p>
                <button class="btn btn-sm btn-success" onclick="loadComments(true)">🔄 إعادة المحاولة</button>
            </div>
        `;
        if (showRefreshMessage) showNotification("❌ خطأ في الاتصال", true);
    }
}

function renderReplies(replies) {
    if (!replies || replies.length === 0) {
        return `<div class="no-replies">📭 لا توجد ردود حتى الآن</div>`;
    }
    
    let html = "";
    replies.forEach(reply => {
        html += `
            <div class="sub-comment">
                <div class="comment-header">
                    <span class="comment-name">
                        <i class="fas fa-reply-all"></i> ${escapeHtml(reply.name)}
                        <span class="reply-badge">رد</span>
                    </span>
                    <span class="comment-date">${reply.date || ""}</span>
                </div>
                <div class="comment-text">
                    <span class="reply-to">
                        <i class="fas fa-reply"></i> رداً على:
                    </span>
                    ${escapeHtml(reply.text)}
                </div>
                <div class="comment-actions">
                    <button class="btn-like" onclick="likeComment(${reply.id}, this)">
                        ❤️ <span class="like-count">${reply.likes || 0}</span>
                    </button>
                    ${isAdmin ? `<button class="btn-delete" onclick="deleteComment(${reply.id}, this)">🗑 حذف</button>` : ''}
                </div>
            </div>
        `;
    });
    return html;
}

function toggleReplies(commentId) {
    const container = document.getElementById(`replies-${commentId}`);
    const icon = document.getElementById(`toggle-icon-${commentId}`);
    const btn = document.getElementById(`toggle-btn-${commentId}`);
    
    if (container.style.display === 'none') {
        container.style.display = 'block';
        if (icon) icon.className = "fas fa-chevron-down";
        if (btn) {
            const count = container.querySelectorAll('.sub-comment').length;
            btn.innerHTML = `<i class="fas fa-comments"></i> الردود (${count}) <i class="fas fa-chevron-down" id="toggle-icon-${commentId}"></i>`;
        }
    } else {
        container.style.display = 'none';
        if (icon) icon.className = "fas fa-chevron-up";
        if (btn) {
            const count = container.querySelectorAll('.sub-comment').length;
            btn.innerHTML = `<i class="fas fa-comments"></i> الردود (${count}) <i class="fas fa-chevron-up" id="toggle-icon-${commentId}"></i>`;
        }
    }
}

// ==================== ADMIN LOGIN ====================
function adminLogin() {
    Swal.fire({
        title: "وضع المشرف",
        text: "أدخل كلمة المرور",
        input: "password",
        showCancelButton: true,
        confirmButtonText: "تأكيد",
        cancelButtonText: "إلغاء"
    }).then(res => {
        if (res.value === "Seddik") {
            isAdmin = true;
            document.getElementById('adminBadge').style.display = 'inline-block';
            Swal.fire({ icon: 'success', title: 'تم التفعيل!', timer: 2000, showConfirmButton: false });
            loadComments(true);
        } else if (res.value) {
            Swal.fire({ icon: 'error', title: 'كلمة المرور غير صحيحة' });
        }
    });
}
